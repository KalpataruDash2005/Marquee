<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Design</title>
  <style>
    :root{
      --bg: #2f0438;
      --primary: #8350bc;
      --primary-2:#6f3fb0;
      --card: rgba(255,255,255,0.06);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.78);
      --light: #e0d9e8;
      --lightText:#181717;
      --shadow: 0 18px 40px rgba(0,0,0,0.22);
      --radius: 22px;
    }

    *{ box-sizing: border-box; }

    body{
      margin:0;
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(179, 145, 217, 0.35), transparent 55%),
                  radial-gradient(900px 500px at 90% 40%, rgba(149, 126, 181, 0.28), transparent 55%),
                  var(--bg);
      padding: 28px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Helvetica Neue", "Noto Sans", "Liberation Sans", sans-serif;
    }

    .container{
      width: min(860px, 100%);
      height: min(640px, 80vh);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(131,80,188,0.35), rgba(47,23,80,0.10));
      padding: 16px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 14px;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .box{
      border-radius: 18px;
      color: var(--text);
      display:flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 18px;
      position: relative;
      overflow:hidden;
      font-weight: 700;
      letter-spacing: 0.2px;
      background: rgba(131,80,188,0.45);
      border: 1px solid rgba(255,255,255,0.10);
      transition: transform 180ms ease, filter 180ms ease, background 180ms ease;
    }

    .box::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(600px 140px at 20% 10%, rgba(255,255,255,0.18), transparent 55%),
        radial-gradient(400px 120px at 90% 80%, rgba(0,0,0,0.20), transparent 55%);
      opacity: 0.9;
      pointer-events:none;
    }

    .box > *{ position: relative; }

    .box:hover{
      transform: translateY(-3px);
      filter: brightness(1.05);
      background: rgba(131,80,188,0.60);
    }

    .title{
      font-size: 20px;
      font-weight: 800;
      margin: 0;
    }

    .big{
      font-size: clamp(36px, 5.2vw, 56px);
      line-height: 1;
      margin: 0;
    }

    .label{
      margin: 10px 0 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .box6{
      background: rgba(224,217,232,0.95);
      border: 1px solid rgba(255,255,255,0.35);
      color: var(--lightText);
    }
    .box6:hover{ background: rgba(224,217,232,1); filter: saturate(1.05); }
    .box6 .label{ color: rgba(24,24,24,0.65); }

    .box5{
      background: linear-gradient(135deg, rgba(131,80,188,0.65), rgba(47,23,80,0.2));
      font-size: clamp(32px, 4.8vw, 56px);
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .box7{
      align-items: flex-start;
      justify-content: center;
      padding-left: 22px;
      background: rgba(131,80,188,0.55);
    }

    .box7 h3{
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      max-width: 420px;
      line-height: 1.35;
    }

    /* placements (same as your original layout) */
    .box1{ grid-column: 1 / 2;}
    .box2{ grid-column: 2 / 3;}
    .box3{ grid-column: 3 / 4;}
    .box4{ grid-column: 1 / 2;}
    .box5{ grid-column: 2 / 3;}
    .box6{ grid-column: 3 / 4; grid-row: 2 / 4; }
    .box7{ grid-column: 1/3; grid-row: 3/4; }

    /* Keep your exact 3x3 grid layout (only adjust sizing) */
    @media (max-width: 820px){
      .container{
        height: min(640px, 84vh);
      }
    }

    @media (max-width: 520px){
      body{ padding: 16px; }
      .container{
        height: auto;
        min-height: 620px;
        gap: 12px;
      }
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="box box1">
      <h1 class="title">Social Media</h1>
    </div>

    <div class="box box2">
      <h2 class="big">25K</h2>
      <div class="label">Weekly Likes</div>
    </div>

    <div class="box box3">
      <h2 class="big">50K</h2>
      <div class="label">Weekly Views</div>
    </div>

    <div class="box box4">
      <div class="label" style="margin-top:0;">Active Users</div>
      <h2 class="big" style="margin-top:10px;">1,528</h2>
    </div>

    

    <div class="box box5">
      <div class="title">DESIGN</div>
    </div>

    <div class="box box6">
      <div class="label" style="margin-top:0;">Total Subscribers</div>
      <h2 class="big" style="margin-top:10px;">200K</h2>
    </div>

    <div class="box box7">
      <h3>A place to learn UI Design &amp; Web Design</h3>
    </div>
  </div>
</body>
</html>
