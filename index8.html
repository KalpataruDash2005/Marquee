<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>

    <!-- FontAwesome for social icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
        .card{
            border-radius: 30px;
            border: 2px solid rgb(255, 255, 255);
            height :600px;
            width: 400px;
            margin: auto;
        }
        .img{
            height:200px;
            width: 200px;
            border-radius: 50%;
            margin-top: 50px;
            margin-left: 95px;

        }
        .box{
            height: 348px;
            width: 400px;
            border-bottom-right-radius: 30px;
            border-bottom-left-radius: 30px;
            background-color: #f3f6f8;
            display:flex;
            flex-direction:column;
        }
        .info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
            
      
        .social{
            height: 50px;
            width: 400px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            font-size: 26px;
            margin-top: 8px;
            color: #1f6feb;
        }
        .social i{
            transition: transform 160ms ease, color 160ms ease;
        }
        .social i:hover{
            transform: translateY(-2px);
            color: #0b3d91;
        }
        .btn{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            margin-top: 20px;
        }
        .btn button{
            height:40px;
            width:120px;
            background-color: #64adec;
            border-radius: 20px;
            border: none ;
            color: #fff;
            font-weight: 200;
            font-size: 21px;
        }

        .stats{
            margin-top: auto;
            padding: 16px 18px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .stat{
            background: #f6fbff;
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 16px;
            padding: 12px 10px;
            text-align: center;
        }
        .stat .num{
            font-size: 20px;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.1;
        }
        .stat .label{
            font-size: 12px;
            font-weight: 600;
            color: rgba(15, 23, 42, 0.65);
            margin-top: 4px;
        }

        .img img{
            height: 200px;
            width: 200px;
            border-radius: 50%;
            margin-top:35px;
            border: 4px solid #fff;
        }

        #i1{
            color:blue;
        }
        #i2{
            color: #1da1f2;
        }
        #i3{
            color: #e1306c;
        }
        #i4{
            color: #ff0000;
        }
        .ubox{
            height: 200px;
            width: 100%;
            border-top-right-radius: 30px;
            border-top-left-radius: 30px;
            background-color: #61b7e8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="ubox">
            <div class="img"><img src="img.jpg" alt="profile image"></div>
        </div>
        <div class="box">
            <div class="info">
                <h1>CodingLab</h1>
                <h2>YouTuber &amp; Blogger</h2>
            </div>

            <div class="social" aria-label="Social links">
                <i id="i1" class="fa-brands fa-facebook" aria-hidden="true"></i>
                <i id="i2" class="fa-brands fa-twitter" aria-hidden="true"></i>
                <i id="i3" class="fa-brands fa-instagram" aria-hidden="true"></i>
                <i id="i4" class="fa-brands fa-youtube" aria-hidden="true"></i>
            </div>

            <div class="btn">
                <button type="button">Subscribe</button>
                <button type="button">Message</button>
            </div>

            
            <div class="stats" aria-label="Channel stats">
                <div class="stat">
                    <div class="num">❤️1.2K </div>
                </div>
                <div class="stat">
                    <div class="num">💬98K</div>
                </div>
                <div class="stat">
                    <div class="num"> 35k </div>
                </div>
            </div>
        </div>
    
        
</body>
</html>
