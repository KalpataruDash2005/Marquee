<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banananaaaaaaaaa</title>
    <style>
        .con{
            height: 500px;
            width: 800px;
            border: 3px solid black;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 0px;
        }
        .box1{
            background-color: #e66868;
            border-top-left-radius: 50px;
            border-top-right-radius: 50px;
        }
        .box2{
            background-color: #e66868;
            grid-row: 2/3;
        }
        .box2{
            background-color: #e66868;
            grid-row: 2/3;
        }
        .box3{
            background-color: #e66868;
            grid-row:3/4;
        }
        .box4{
            background-color: #e66868;
            grid-row: 4/5;
        }
        .box5{
            background-color: #e66868;
            grid-row: 5/6;
        }
        .box6{
            background-color: #e66868;
            grid-row: 6/7;
        }
        .box7{
            background-color: #e66868;
            grid-row: 7/8;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
        }
        .box8{
            background-color: #e66868;
            grid-column: 2/3;
            grid-row: 4/5;
        }
        .box9{
            background-color: #e66868;
            grid-column: 3/4;
            grid-row: 3/4;
        }
        .box10{
            background-color: #e66868;
            grid-column: 4/5;
            grid-row: 2/3;
        }
        /* .box11{
            background-color: #e66868;
            grid-column: 5/6;
            grid-row: 1/2;
        } */
        .box12{
            background-color: #e66868;
            grid-column: 3/4;
            grid-row: 5/6;
        }
        .box13{
            background-color: #e66868;
            grid-column: 4/5;
            grid-row: 6/7;
        }
        /* .box14{
            background-color: #e66868;
            grid-column: 5/6;
            grid-row: 7/8;
        } */
    </style>
</head>
<body>
    <div class="con">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
        <div class="box6"></div>
        <div class="box7"></div>
        <div class="box8"></div>
        <div class="box9"></div>
        <div class="box10"></div>
        <div class="box11"></div>
        <div class="box12"></div>
        <div class="box13"></div>
        <div class="box14"></div>
    </div>
</body>
</html>
